<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Constructions - יומן עבודה</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="view-login" class="view active">
  <div class="card center-card">
    <div class="logo-circle">🏗️</div>
    <h1>JS Constructions</h1>
    <p class="subtitle">יומן עבודה</p>
    <div class="field">
      <label>קוד כניסה</label>
      <input id="login-code" type="password" inputmode="numeric" placeholder="הזן קוד" />
    </div>
    <div id="login-error" class="error hidden"></div>
    <button class="btn-primary" onclick="doLogin()">כניסה</button>
  </div>
</div>

<!-- ═══════════════ EMPLOYEE SELECT ═══════════════ -->
<div id="view-select" class="view">
  <div class="card center-card">
    <h2>מי אתה?</h2>
    <div id="employee-list" class="employee-list"></div>
  </div>
</div>

<!-- ═══════════════ EMPLOYEE SCREEN ═══════════════ -->
<div id="view-employee" class="view">
  <header class="topbar">
    <span id="emp-name-header" class="topbar-title"></span>
    <button class="btn-icon" onclick="logout()">יציאה</button>
  </header>
  <div class="container">
    <div class="date-badge">
      <span id="emp-day"></span> | <span id="emp-date"></span>
    </div>

    <div class="checkin-row">
      <div id="btn-checkin" class="time-card" onclick="checkIn()">
        <div class="time-icon">🟢</div>
        <div class="time-label">כניסה</div>
        <div id="checkin-time" class="time-value">לחץ לרישום</div>
      </div>
      <div id="btn-checkout" class="time-card" onclick="checkOut()">
        <div class="time-icon">🔵</div>
        <div class="time-label">יציאה</div>
        <div id="checkout-time" class="time-value">לחץ לרישום</div>
      </div>
    </div>

    <div class="field">
      <label>פרויקט</label>
      <select id="emp-project">
        <option value="">בחר פרויקט...</option>
      </select>
    </div>

    <div class="field">
      <label>הערות לחשב</label>
      <textarea id="emp-notes" rows="3" placeholder="לדוגמה: בקשת מפרעה, הוצאה מיוחדת..."></textarea>
    </div>

    <button class="btn-primary" onclick="saveEmployeeEntry()">שמור יום עבודה</button>
    <div id="emp-success" class="success hidden">✅ נשמר בהצלחה!</div>
  </div>
</div>

<!-- ═══════════════ MANAGER SCREEN ═══════════════ -->
<div id="view-manager" class="view">
  <header class="topbar">
    <span class="topbar-title">מנהל - יומן עבודה</span>
    <div class="topbar-actions">
      <button class="btn-icon" onclick="showView('view-settings')">⚙️</button>
      <button class="btn-icon" onclick="exportExcel()">📊 ייצוא</button>
      <button class="btn-icon" onclick="logout()">יציאה</button>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="filterEntries('all', this)">הכל</button>
      <button class="tab" onclick="filterEntries('pending', this)">ממתין</button>
      <button class="tab" onclick="filterEntries('complete', this)">הושלם</button>
    </div>

    <button class="btn-primary" onclick="openNewEntry()">+ הוסף רשומה</button>

    <div id="entries-list" class="entries-list"></div>
  </div>
</div>

<!-- ═══════════════ ENTRY FORM ═══════════════ -->
<div id="view-entry-form" class="view">
  <header class="topbar">
    <button class="btn-icon" onclick="showView('view-manager')">→ חזור</button>
    <span id="form-title" class="topbar-title">רשומה חדשה</span>
  </header>
  <div class="container">
    <input type="hidden" id="form-entry-id" />

    <div class="grid-2">
      <div class="field">
        <label>עובד</label>
        <select id="form-employee" onchange="onEmployeeChange()">
          <option value="">בחר עובד...</option>
        </select>
      </div>
      <div class="field">
        <label>פרויקט</label>
        <select id="form-project">
          <option value="">בחר פרויקט...</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label>שעת כניסה</label>
        <input id="form-checkin" type="time" />
      </div>
      <div class="field">
        <label>שעת יציאה</label>
        <input id="form-checkout" type="time" />
      </div>
    </div>

    <div class="field">
      <label>שעות עבודה</label>
      <input id="form-hours" type="number" step="0.5" min="0" placeholder="0" />
    </div>

    <div class="section-title">💰 הוצאות</div>
    <div class="grid-2">
      <div class="field">
        <label>משיכות (₪)</label>
        <input id="form-withdrawals" type="number" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label>למי המשיכה</label>
        <input id="form-withdrawal-for" type="text" placeholder="שם..." />
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>אוכל (₪)</label>
        <input id="form-food" type="number" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label>חניה (₪)</label>
        <input id="form-parking" type="number" min="0" placeholder="0" />
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>דלק (₪)</label>
        <input id="form-fuel" type="number" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label>עלות לינה (₪)</label>
        <input id="form-accommodation" type="number" min="0" placeholder="0" />
      </div>
    </div>

    <div class="field">
      <label>התחשבות עלות לבעל פרויקט (₪)</label>
      <input id="form-owner-cost" type="number" min="0" placeholder="0" />
    </div>

    <div class="field">
      <label>הערות</label>
      <textarea id="form-notes" rows="2" placeholder="הערות..."></textarea>
    </div>

    <div id="form-cost-preview" class="cost-preview hidden"></div>

    <button class="btn-primary" onclick="saveEntry()">✅ שמור רשומה</button>
  </div>
</div>

<!-- ═══════════════ SETTINGS ═══════════════ -->
<div id="view-settings" class="view">
  <header class="topbar">
    <button class="btn-icon" onclick="showView('view-manager')">→ חזור</button>
    <span class="topbar-title">הגדרות</span>
  </header>
  <div class="container">

    <div class="import-box">
      <div class="section-title">📂 ייבוא מקובץ Excel</div>
      <p style="font-size:13px;color:#666;margin-bottom:8px">בחר את קובץ ה-Excel שלך (לשונית EmployeesDB) — העובדים והפרויקטים יתווספו אוטומטית</p>
      <input type="file" id="import-file" accept=".xlsx,.xls" onchange="importFromExcel(this)" style="display:none" />
      <button class="btn-primary" onclick="document.getElementById('import-file').click()">📥 בחר קובץ Excel לייבוא</button>
      <div id="import-status" class="hidden" style="margin-top:8px;font-size:13px;color:green"></div>
    </div>

    <div class="section-title" style="margin-top:24px">👷 עובדים</div>
    <div id="employees-list" class="settings-list"></div>
    <div class="grid-2">
      <input id="new-emp-name" type="text" placeholder="שם עובד" />
      <button class="btn-secondary" onclick="addEmployee()">+ הוסף</button>
    </div>

    <div class="section-title" style="margin-top:24px">🏗️ פרויקטים</div>
    <div id="projects-list" class="settings-list"></div>
    <div class="grid-2">
      <input id="new-project-name" type="text" placeholder="שם פרויקט" />
      <button class="btn-secondary" onclick="addProject()">+ הוסף</button>
    </div>
  </div>
</div>

<!-- SheetJS for Excel export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<!-- Firebase -->
<script type="module" src="app.js"></script>

</body>
</html>
